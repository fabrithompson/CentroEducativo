packages:
  - "backend"
  - "frontend"

# Habilita los install scripts nativos que necesitan estas deps:
# - prisma / @prisma/* descargan engines nativos
# - bcrypt compila su módulo nativo
# - esbuild extrae su binario nativo (usado por tsx y Vite)
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  bcrypt: true
  esbuild: true
  prisma: true
